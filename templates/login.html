{% extends "base.html" %}
{% block title %}Login — GM Connected{% endblock %}
{% block content %}
<div class="auth-box">
  <h1>🏒 GM Connected</h1>
  <h2>Sign In</h2>
  <form method="POST">
    <label>Username <input type="text" name="username" required autofocus></label>
    <label>Password <input type="password" name="password" required></label>
    <button type="submit" class="btn btn-primary">Sign In</button>
  </form>
  <p>New GM? <a href="{{ url_for('register') }}">Pick your team →</a></p>
</div>
{% endblock %}
